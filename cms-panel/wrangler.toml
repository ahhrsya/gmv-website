name = "gmv-cms"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# Static assets served from /public
[assets]
directory = "./public"
binding = "ASSETS"

# KV namespace (optional, for caching + read/write)
# Create with:  wrangler kv namespace create CMS_KV
# Then add the id below:
# [[kv_namespaces]]
# binding = "CMS_KV"
# id = "..."

# Secrets (set with `wrangler secret put GITHUB_TOKEN` and `wrangler secret put GITHUB_REPO`)
# GITHUB_TOKEN  — PAT with `contents:write` scope on ahhrsya/gmv-website
# GITHUB_REPO   — "ahhrsya/gmv-website"
